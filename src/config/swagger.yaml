openapi: 3.0.0
info:
  title: Blog API - INF222 TAF1
  description: API Backend pour la gestion d'articles de blog
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Serveur local

tags:
  - name: Articles
    description: Gestion des articles du blog

paths:
  /api/articles:
    get:
      tags: [Articles]
      summary: Récupérer tous les articles (avec filtres optionnels)
      parameters:
        - in: query
          name: categorie
          schema: { type: string }
          description: Filtrer par catégorie
        - in: query
          name: auteur
          schema: { type: string }
          description: Filtrer par auteur
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Filtrer par date (YYYY-MM-DD)
      responses:
        "200":
          description: Liste des articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items: { $ref: '#/components/schemas/Article' }
        "500":
          description: Erreur serveur

    post:
      tags: [Articles]
      summary: Créer un nouvel article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArticleInput' }
      responses:
        "201":
          description: Article créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  article: { $ref: '#/components/schemas/Article' }
        "400":
          description: Données invalides
        "500":
          description: Erreur serveur

  /api/articles/search:
    get:
      tags: [Articles]
      summary: Rechercher des articles par titre ou contenu
      parameters:
        - in: query
          name: query
          required: true
          schema: { type: string }
          description: Texte à rechercher
      responses:
        "200":
          description: Articles correspondants
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items: { $ref: '#/components/schemas/Article' }
        "400":
          description: Paramètre query manquant

  /api/articles/{id}:
    get:
      tags: [Articles]
      summary: Récupérer un article par son ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Article trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  article: { $ref: '#/components/schemas/Article' }
        "404":
          description: Article introuvable
        "400":
          description: ID invalide

    put:
      tags: [Articles]
      summary: Modifier un article existant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArticleUpdate' }
      responses:
        "200":
          description: Article modifié avec succès
        "404":
          description: Article introuvable
        "400":
          description: ID invalide

    delete:
      tags: [Articles]
      summary: Supprimer un article
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Article supprimé avec succès
        "404":
          description: Article introuvable

components:
  schemas:
    Article:
      type: object
      properties:
        id:        { type: integer, example: 1 }
        titre:     { type: string,  example: "Introduction à Node.js" }
        contenu:   { type: string,  example: "Node.js est un environnement..." }
        auteur:    { type: string,  example: "Charles" }
        date:      { type: string,  format: date, example: "2026-03-23" }
        categorie: { type: string,  example: "Technologie" }
        tags:      { type: array, items: { type: string }, example: ["nodejs", "backend"] }

    ArticleInput:
      type: object
      required: [titre, contenu, auteur]
      properties:
        titre:     { type: string,  example: "Introduction à Node.js" }
        contenu:   { type: string,  example: "Node.js est un environnement..." }
        auteur:    { type: string,  example: "Charles" }
        date:      { type: string,  format: date, example: "2026-03-23" }
        categorie: { type: string,  example: "Technologie" }
        tags:      { type: array, items: { type: string }, example: ["nodejs", "backend"] }

    ArticleUpdate:
      type: object
      properties:
        titre:     { type: string }
        contenu:   { type: string }
        categorie: { type: string }
        tags:      { type: array, items: { type: string } }
